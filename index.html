// ── Date helpers ──────────────────────────────────────────────────────────────
function localDateStr(d){
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function todayStr(){return localDateStr(new Date());}
function getISOWeek(date=new Date()){
  const d=new Date(date);d.setHours(12,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w1=new Date(d.getFullYear(),0,4);
  return`${d.getFullYear()}-W${String(1+Math.round(((d-w1)/86400000-3+(w1.getDay()+6)%7)/7)).padStart(2,"0")}`;
}
function getWeekStart(wid){
  const[yr,wk]=wid.split("-W");const j4=new Date(Number(yr),0,4);
  const dow=(j4.getDay()+6)%7;const m=new Date(j4);m.setDate(j4.getDate()-dow);
  m.setDate(m.getDate()+(Number(wk)-1)*7);return m;
}
function getUpcomingMondays(n=16){
  const mondays=[];const d=new Date();
  const day=d.getDay();const diff=day===1?0:(8-day)%7||7;
  d.setDate(d.getDate()+diff);d.setHours(12,0,0,0);
  for(let i=0;i<n;i++){mondays.push(new Date(d));d.setDate(d.getDate()+7);}
  return mondays;
}
const blankWeek=()=>({calls:0,connectedCalls:0,noAnswer:0,wrongNumber:0,voicemails:0,emailsSent:0,linkedinSent:0,contactsWorked:0,mb:0,ma:0,newDeals:0,dealsWon:0,hotLeads:0,warmLeads:0,pipelineValue:0,closedWonValue:0,dtm:0,dt:0,lis:0});
function sumWeeks(weeks){const b=blankWeek();for(const w of weeks)for(const k of Object.keys(b))b[k]=(b[k]||0)+(w[k]||0);return b;}
function getAggStats(history,period="all"){
  if(!history||!history.length)return blankWeek();
  const now=new Date();let weeks=history;
  if(period==="week"){const cur=getISOWeek();weeks=history.filter(h=>h.weekId===cur);}
  else if(period==="month"){const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;weeks=history.filter(h=>{const ws=getWeekStart(h.weekId);return`${ws.getFullYear()}-${String(ws.getMonth()+1).padStart(2,"0")}`===ym;});}
  else if(period==="quarter"){const q=Math.floor(now.getMonth()/3);weeks=history.filter(h=>{const ws=getWeekStart(h.weekId);return ws.getFullYear()===now.getFullYear()&&Math.floor(ws.getMonth()/3)===q;});}
  return sumWeeks(weeks);
}

  let t=0,r=n,c=0;
  for(const[max,rate]of[[10,50],[20,65],[Infinity,85]]){const inn=Math.min(r,max-c);if(inn<=0)break;t+=inn*rate;r-=inn;c+=inn;if(r<=0)break;}

}

function EC({value,onChange,type="text",opts=null,canEdit=true}){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState(String(value??""));
  const ref=useRef();
  useEffect(()=>setVal(String(value??"")),[value]);
  useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  if(!canEdit)return <span style={{fontSize:13}}>{value||"—"}</span>;
  if(editing){
    const commit=()=>{setEditing(false);if(val!==String(value??""))onChange(val);};
    if(opts)return <select ref={ref} style={S.iS} value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==="Enter"&&commit()}>{opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>;
    return <input ref={ref} style={S.iI} type={type} value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==="Enter"&&commit()}/>;
  }
  return <span onClick={()=>setEditing(true)} style={{cursor:"pointer",borderBottom:"1px dashed var(--color-border-secondary)",paddingBottom:1,fontSize:13}} title="Click to edit">{value||<span style={{color:"var(--color-text-tertiary)"}}>—</span>}</span>;
}

function Md({text=""}){
  return <>{text.split("\n").map((l,i)=>{
    if(l.startsWith("# "))return <h2 key={i} style={{fontSize:16,fontWeight:600,margin:"0 0 10px"}}>{l.slice(2)}</h2>;
    if(l.startsWith("## "))return <h3 key={i} style={{fontSize:14,fontWeight:500,margin:"14px 0 6px",color:"var(--color-text-secondary)"}}>{l.slice(3)}</h3>;
    if(l.startsWith("- ")||l.startsWith("• "))return <div key={i} style={{paddingLeft:16,marginBottom:4,fontSize:13}}>• {l.slice(2)}</div>;
    if(/^\d+\./.test(l))return <div key={i} style={{paddingLeft:16,marginBottom:4,fontSize:13}}>{l}</div>;
    if(!l)return <div key={i} style={{height:8}}/>;
    return <div key={i} style={{fontSize:13,marginBottom:4,lineHeight:1.65}}>{l}</div>;
  })}</>;
}

// ── ICS export helper ─────────────────────────────────────────────────────────
function icsDate(dateStr,hour=10){
  const d=new Date(dateStr+"T"+String(hour).padStart(2,"0")+":00:00");
  return d.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"");
}
function downloadICS(events){
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Momentum HQ//EN","CALSCALE:GREGORIAN"];
  for(const ev of events){
    lines.push("BEGIN:VEVENT");
    lines.push(`UID:${ev.id}@momentumhq`);
    lines.push(`DTSTART:${icsDate(ev.date,10)}`);
    lines.push(`DTEND:${icsDate(ev.date,ev.endHour||11)}`);
    lines.push(`SUMMARY:${ev.title}`);
    if(ev.notes)lines.push(`DESCRIPTION:${ev.notes.replace(/\n/g,"\\n")}`);
    lines.push("END:VEVENT");
  }
  lines.push("END:VCALENDAR");
  const blob=new Blob([lines.join("\r\n")],{type:"text/calendar"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="momentum-events.ics";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

            return <div key={a.id} style={{...S.row,justifyContent:"space-between",padding:"8px 0",borderBottom:"0.5px solid var(--color-border-tertiary)",opacity:0.5}}>
              <div style={{...S.row,flex:1,gap:10}}>
                <input type="checkbox" checked={true} onChange={()=>toggleAction(a.id)} style={{accentColor:t.color,width:16,height:16,flexShrink:0,cursor:"pointer"}}/>
                <div style={{...S.av(t.color),width:24,height:24,fontSize:10,flexShrink:0}}>{t.ini}</div>
                <div style={{fontSize:13,textDecoration:"line-through",color:"var(--color-text-tertiary)"}}>{a.text}</div>
              </div>
              <button onClick={()=>deleteAction(a.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:16,padding:"0 4px"}}>×</button>
            </div>;
          })}
        </div>}
      </>}
    </div>
  </div>;
}


// ── Team Calendar ─────────────────────────────────────────────────────────────
const EVT_COLORS={
  meeting:{bg:BRAND,light:BL,label:"Client meeting"},
  internal:{bg:"#378ADD",light:"#EAF3FB",label:"Internal"},
  deadline:{bg:"#A32D2D",light:"#FCEBEB",label:"Deadline"},
  onboarding:{bg:"#8B5CF6",light:"#F0EBFE",label:"Onboarding"},
  monday:{bg:"#0F6E56",light:"#E1F5EE",label:"Monday meeting"},
  rhythm:{bg:"#854F0B",light:"#FAEEDA",label:"Team rhythm"},
};

function TeamCalendar({user,data,onSave}){
  const today=new Date();
  const[yr,setYr]=useState(today.getFullYear());
  const[mo,setMo]=useState(today.getMonth());
  const[selEvt,setSelEvt]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[showRhythm,setShowRhythm]=useState(false);
  const[editNotes,setEditNotes]=useState("");
  const[editingNotes,setEditingNotes]=useState(false);
  const[dragId,setDragId]=useState(null);
  const[form,setForm]=useState({title:"",date:"",type:"internal",notes:""});
  const[rhythmForm,setRhythmForm]=useState({type:"monthly",employee:"harry",startDate:"",duration:30});

  const mondays=getUpcomingMondays(52);
  const mondaySet=new Set(mondays.map(m=>localDateStr(m)));
  const events=data.calendarEvents||[];
  const saveEvts=evts=>onSave({...data,calendarEvents:evts});

  const dim=new Date(yr,mo+1,0).getDate();
  const first=(new Date(yr,mo,1).getDay()+6)%7;
  const cells=Math.ceil((first+dim)/7)*7;

  const evtsOn=d=>{
    const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const reg=events.filter(e=>e.date===ds);
    if(mondaySet.has(ds))return[{id:`monday-${ds}`,title:"Monday Meeting · 10am",date:ds,type:"monday",notes:"",isMondayMeeting:true},...reg];
    return reg;
  };

  const upcoming=[
    ...mondays.filter(m=>localDateStr(m)>=localDateStr(today)).slice(0,3).map(m=>({id:`monday-${localDateStr(m)}`,title:"Monday Meeting · 10am",date:localDateStr(m),type:"monday",notes:"",isMondayMeeting:true})),
    ...events.filter(e=>e.date>=localDateStr(today))
  ].sort((a,b)=>a.date>b.date?1:-1).slice(0,10);

  const generateRhythm=()=>{
    if(!rhythmForm.startDate)return;
    const emp=getUser(rhythmForm.employee);
    const newEvts=[];
    const start=new Date(rhythmForm.startDate+"T12:00:00");
    const count=rhythmForm.type==="monthly"?12:4;
    for(let i=0;i<count;i++){
      const d=new Date(start);
      if(rhythmForm.type==="monthly")d.setMonth(d.getMonth()+i);
      else d.setMonth(d.getMonth()+i*3);
      const label=rhythmForm.type==="monthly"?"Monthly 1-1":"Quarterly Review";
      const dur=rhythmForm.type==="monthly"?30:60;
      newEvts.push({id:Date.now()+i,title:`Hannah / ${emp?.name} — ${label}`,date:localDateStr(d),type:"rhythm",notes:`${dur} mins · ${rhythmForm.type==="monthly"?"Monthly check-in — pipeline, blockers, commission":"Quarterly review — performance, goals, development"}`,createdBy:"hannah"});
    }
    saveEvts([...newEvts,...events]);
    setShowRhythm(false);
  };

  const exportVisible=()=>{
    const month=`${yr}-${String(mo+1).padStart(2,"0")}`;
    const toExport=[
      ...mondays.filter(m=>localDateStr(m).startsWith(month)).map(m=>({id:`monday-${localDateStr(m)}`,title:"Momentum Monday Meeting",date:localDateStr(m),notes:"Weekly team meeting 10am",endHour:11})),
      ...events.filter(e=>e.date.startsWith(month)).map(e=>({...e,endHour:e.type==="rhythm"?11:11}))
    ];
    downloadICS(toExport);
  };

  const mName=new Date(yr,mo,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});

  return <div>
    <div style={{...S.row,justifyContent:"space-between",marginBottom:4}}>
      <div style={S.pt}>Team Calendar</div>
      <div style={S.row}>
        <button style={{...S.btn(),padding:"6px 10px"}} onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}}>←</button>
        <span style={{fontSize:14,fontWeight:500,minWidth:160,textAlign:"center"}}>{mName}</span>
        <button style={{...S.btn(),padding:"6px 10px"}} onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}}>→</button>
        <button style={{...S.btn(),fontSize:12}} onClick={()=>setShowRhythm(true)}>+ Add rhythm</button>
        <button style={{...S.btn(),fontSize:12}} onClick={exportVisible}>Export month .ics</button>
        <button style={S.btn("p")} onClick={()=>setShowAdd(true)}>+ Add event</button>
      </div>
    </div>
    <div style={S.ps}>Monday meetings auto-appear · "Export month .ics" imports into Google Calendar · Drag events to reschedule</div>
    <div style={{...S.row,marginBottom:16,flexWrap:"wrap",gap:8}}>
      {Object.entries(EVT_COLORS).map(([t,{bg,label}])=><div key={t} style={S.row}><div style={{width:10,height:10,borderRadius:"50%",background:bg}}/><span style={{fontSize:11,color:"var(--color-text-secondary)"}}>{label}</span></div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:16}}>
      <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
          {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=><div key={d} style={{padding:"8px 0",textAlign:"center",fontSize:11,fontWeight:600,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.05em"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {Array.from({length:cells},(_,i)=>{
            const dn=i-first+1;const valid=dn>=1&&dn<=dim;
            const ds=valid?`${yr}-${String(mo+1).padStart(2,"0")}-${String(dn).padStart(2,"0")}`:"";
            const isToday=valid&&dn===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
            const dayEvts=valid?evtsOn(dn):[];const isWknd=(i%7)>=5;
            return <div key={i} style={{minHeight:90,borderRight:"0.5px solid var(--color-border-tertiary)",borderBottom:"0.5px solid var(--color-border-tertiary)",padding:4,background:valid?(isWknd?"var(--color-background-secondary)":"var(--color-background-primary)"):"var(--color-background-tertiary)"}} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();if(dragId&&valid&&!String(dragId).startsWith("monday"))saveEvts(events.map(ev=>ev.id===dragId?{...ev,date:ds}:ev));setDragId(null);}}>
              {valid&&<div style={{fontSize:12,fontWeight:isToday?700:400,color:isToday?"#fff":"var(--color-text-secondary)",marginBottom:2,width:22,height:22,borderRadius:"50%",background:isToday?BRAND:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{dn}</div>}
              {dayEvts.slice(0,3).map(evt=>{const col=EVT_COLORS[evt.type]||EVT_COLORS.internal;return <div key={evt.id} draggable={!evt.isMondayMeeting} onDragStart={()=>!evt.isMondayMeeting&&setDragId(evt.id)} onClick={()=>{setSelEvt(evt);setEditNotes(evt.notes||"");setEditingNotes(false);}} style={{fontSize:10,padding:"2px 5px",borderRadius:4,background:col.light,color:col.bg,fontWeight:500,marginBottom:2,cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",borderLeft:`3px solid ${col.bg}`,lineHeight:1.4}}>{evt.title}</div>;})}
              {dayEvts.length>3&&<div style={{fontSize:10,color:"var(--color-text-tertiary)",paddingLeft:4}}>+{dayEvts.length-3} more</div>}
            </div>;
          })}
        </div>
      </div>
      <div style={{...S.card,marginBottom:0}}>
        <div style={S.ct}>Coming up</div>
        {upcoming.map(evt=>{const col=EVT_COLORS[evt.type]||EVT_COLORS.internal;return <div key={evt.id} onClick={()=>{setSelEvt(evt);setEditNotes(evt.notes||"");setEditingNotes(false);}} style={{padding:"8px 0",borderBottom:"0.5px solid var(--color-border-tertiary)",cursor:"pointer"}}><div style={{...S.row,gap:6,marginBottom:2}}><div style={{width:8,height:8,borderRadius:"50%",background:col.bg,flexShrink:0,marginTop:2}}/><div style={{fontSize:12,fontWeight:500,lineHeight:1.4,flex:1}}>{evt.title}</div></div><div style={{fontSize:11,color:"var(--color-text-tertiary)",paddingLeft:14}}>{fmt(evt.date)}</div></div>;})}
      </div>
    </div>

    {/* Event detail modal */}
    {selEvt&&(()=>{
      const col=EVT_COLORS[selEvt.type]||EVT_COLORS.internal;
      if(selEvt.isMondayMeeting)return <div style={S.modal} onClick={e=>e.target===e.currentTarget&&setSelEvt(null)}>
        <div style={S.mbox}>
          <div style={{...S.row,justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:13,fontWeight:600,color:col.bg}}>Monday Meeting</span><button onClick={()=>setSelEvt(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#888"}}>×</button></div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Monday Meeting · 10am</div>
          <div style={{fontSize:13,color:"#888",marginBottom:16}}>{fmt(selEvt.date)}</div>
          <p style={{fontSize:13,color:"#555",lineHeight:1.6,marginBottom:16}}>Open the Monday Meeting tab to view and fill in the agenda.</p>
          <div style={{...S.row,gap:8,justifyContent:"flex-end"}}>
            <button style={{...S.btn(),fontSize:12}} onClick={()=>downloadICS([{id:selEvt.id,title:"Momentum Monday Meeting",date:selEvt.date,notes:"Weekly team meeting 10am",endHour:11}])}>Export .ics</button>
            <button style={S.btn("p")} onClick={()=>setSelEvt(null)}>Close</button>
          </div>
        </div>
      </div>;
      return <div style={S.modal} onClick={e=>e.target===e.currentTarget&&setSelEvt(null)}>
        <div style={S.mbox}>
          <div style={{...S.row,justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:11,fontWeight:600,color:col.bg,textTransform:"uppercase",letterSpacing:"0.05em"}}>{col.label}</span><button onClick={()=>setSelEvt(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#888"}}>×</button></div>
          <div style={{fontSize:17,fontWeight:600,color:"#111",marginBottom:4}}>{selEvt.title}</div>
          <div style={{fontSize:13,color:"#888",marginBottom:16}}>{fmt(selEvt.date)}</div>
          <div style={{marginBottom:16}}>
            <div style={{...S.row,justifyContent:"space-between",marginBottom:6}}><label style={{fontSize:12,fontWeight:500,color:"#555"}}>Notes</label>{!editingNotes&&<button style={{...S.btn(),fontSize:11,padding:"2px 8px"}} onClick={()=>setEditingNotes(true)}>Edit</button>}</div>
            {editingNotes?<><textarea style={{...minp(),height:100,resize:"vertical",marginBottom:8}} value={editNotes} onChange={e=>setEditNotes(e.target.value)}/><div style={{...S.row,justifyContent:"flex-end",gap:8}}><button style={S.btn()} onClick={()=>setEditingNotes(false)}>Cancel</button><button style={S.btn("p")} onClick={()=>{saveEvts(events.map(ev=>ev.id===selEvt.id?{...ev,notes:editNotes}:ev));setSelEvt({...selEvt,notes:editNotes});setEditingNotes(false);}}>Save</button></div></>
            :<div style={{fontSize:13,color:"#333",lineHeight:1.6,minHeight:40,padding:"8px 10px",background:"#f9f9f9",borderRadius:6}}>{selEvt.notes||<span style={{color:"#aaa"}}>No notes.</span>}</div>}
          </div>
          <div style={{...S.row,justifyContent:"space-between"}}>
            <button style={{...S.btn(),fontSize:12,color:"#A32D2D"}} onClick={()=>{saveEvts(events.filter(ev=>ev.id!==selEvt.id));setSelEvt(null);}}>Delete</button>
            <div style={{...S.row,gap:8}}>
              <button style={{...S.btn(),fontSize:12}} onClick={()=>downloadICS([{...selEvt,endHour:selEvt.type==="rhythm"?11:11}])}>Export .ics</button>
              <label style={{fontSize:12,color:"#888"}}>Move to:</label>
              <input type="date" style={{...minp(),width:"auto",fontSize:12}} defaultValue={selEvt.date} onBlur={e=>{if(e.target.value&&e.target.value!==selEvt.date){saveEvts(events.map(ev=>ev.id===selEvt.id?{...ev,date:e.target.value}:ev));setSelEvt({...selEvt,date:e.target.value});}}}/>
            </div>
          </div>
        </div>
      </div>;
    })()}

    {/* Add event */}
    {showAdd&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
      <div style={S.mbox}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:16,color:"#111"}}>Add event</div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Title</label><input style={minp()} value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Date</label><input style={minp()} type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Type</label><select style={msel()} value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>{Object.entries(EVT_COLORS).filter(([t])=>t!=="monday").map(([t,{label}])=><option key={t} value={t}>{label}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Notes</label><textarea style={{...minp(),height:80,resize:"vertical"}} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/></div>
        <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:20}}><button style={S.btn()} onClick={()=>setShowAdd(false)}>Cancel</button><button style={S.btn("p")} onClick={()=>{if(!form.title||!form.date)return;saveEvts([{...form,id:Date.now(),createdBy:user.id},...events]);setShowAdd(false);setForm({title:"",date:"",type:"internal",notes:""});}}>Add</button></div>
      </div>
    </div>}

    {/* Add rhythm */}
    {showRhythm&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&setShowRhythm(false)}>
      <div style={S.mbox}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:4,color:"#111"}}>Add recurring team rhythm</div>
        <div style={{fontSize:12,color:"#888",marginBottom:16}}>Generates events automatically. Export as .ics to add to Google Calendar.</div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Type</label><select style={msel()} value={rhythmForm.type} onChange={e=>setRhythmForm({...rhythmForm,type:e.target.value})}><option value="monthly">Monthly 1-1 (30 mins · 12 months)</option><option value="quarterly">Quarterly review (1 hour · 4 quarters)</option></select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Team member</label><select style={msel()} value={rhythmForm.employee} onChange={e=>setRhythmForm({...rhythmForm,employee:e.target.value})}>{USERS.filter(u=>u.role!=="admin").map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>First meeting date</label><input style={minp()} type="date" value={rhythmForm.startDate} onChange={e=>setRhythmForm({...rhythmForm,startDate:e.target.value})}/></div>
        <div style={{padding:"10px 14px",background:"#E1F5EE",borderRadius:8,marginBottom:16,fontSize:12,color:"#0F6E56"}}>
          This will create {rhythmForm.type==="monthly"?12:4} events on the team calendar. Export them as .ics to share with {getUser(rhythmForm.employee)?.name} and add to Google Calendar.
        </div>
        <div style={{...S.row,justifyContent:"flex-end",gap:8}}><button style={S.btn()} onClick={()=>setShowRhythm(false)}>Cancel</button><button style={S.btn("p")} onClick={generateRhythm}>Generate events</button></div>
      </div>
    </div>}
  </div>;
}
// ── Overview ──────────────────────────────────────────────────────────────────
function Overview({user,data,onNav}){
  const adm=user.role==="admin";
  const mtgs=adm?data.meetings:data.meetings.filter(m=>m.sp===user.id);
  const cms=adm?data.commissions:data.commissions.filter(x=>x.sp===user.id);
  const totalPipeline=data.clients.reduce((a,cl)=>a+(getAggStats(cl.history,"all").pipelineValue||0),0);
  const totalClosed=data.clients.reduce((a,cl)=>a+(cl.closedWonValue||0),0);
  const mondays=getUpcomingMondays(1);const nextMondayStr=localDateStr(mondays[0]);
  const mm=data.mondayMeetings||{};const nextMM=mm[nextMondayStr];
  const mmTotal=nextMM?nextMM.agenda.reduce((a,s)=>a+s.items.length,0):0;
  const mmDone=nextMM?nextMM.agenda.reduce((a,s)=>a+s.items.filter(i=>i.checked).length,0):0;
  return <div>
    <div style={S.pt}>Overview</div>
    <div style={S.ps}>{adm?"Team performance at a glance":`Welcome back, ${user.name}`}</div>
    <div style={adm?S.g(5):S.g(4)}>
      <Met label="Meetings attended" value={mtgs.filter(m=>m.status==="attended").length}/>
      <Met label="Meetings booked" value={mtgs.filter(m=>m.status==="booked").length}/>
      <Met label="Pending commission" value={`£${cms.filter(x=>x.status==="pending").reduce((a,b)=>a+b.amount,0).toLocaleString()}`}/>
      {adm?<><Met label="Total pipeline" value={`£${totalPipeline.toLocaleString()}`} color={BRAND}/><Met label="Total closed won" value={`£${totalClosed.toLocaleString()}`} color="#0F6E56"/></>:<Met label="Paid commission" value={`£${cms.filter(x=>x.status==="paid").reduce((a,b)=>a+b.amount,0).toLocaleString()}`}/>}
    </div>
    {adm&&<div onClick={()=>onNav("mondaymeeting")} style={{...S.card,cursor:"pointer",borderColor:BRAND+"40",background:`linear-gradient(135deg,${BRAND}08,transparent)`,marginBottom:16}}>
      <div style={{...S.row,justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:BRAND,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Next Monday Meeting · {fmt(nextMondayStr)}</div>
          {nextMM?(()=>{
            const team=["harry","gen","katie","sumaya"];
            const covered=team.filter(id=>nextMM.people?.[id]?.done).length;
            const openActions=(nextMM.actions||[]).filter(a=>!a.done).length;
            return <div style={{fontSize:14,fontWeight:500}}>{covered}/{team.length} people covered{openActions>0?` · ${openActions} open action${openActions!==1?"s":""}`:" · No open actions"}</div>;
          })()
          :<div style={{fontSize:14,fontWeight:500}}>Prep not started — click to add notes</div>}
        </div>
        <span style={{fontSize:20,color:BRAND}}>→</span>
      </div>
    </div>}
    <div style={S.card}>
      <div style={S.ct}>Recent meetings</div>
      <table style={S.tbl}><thead><tr><th style={S.th}>Client</th><th style={S.th}>Booked with</th>{adm&&<th style={S.th}>Rep</th>}<th style={S.th}>Date</th><th style={S.th}>Status</th></tr></thead>
      <tbody>{[...mtgs].sort((a,b)=>new Date(b.booked)-new Date(a.booked)).slice(0,6).map(m=>{const u=getUser(m.sp);return <tr key={m.id}><td style={S.td}>{m.client}</td><td style={{...S.td,color:"var(--color-text-secondary)"}}>{m.contact||"—"}</td>{adm&&<td style={S.td}><div style={S.row}><div style={{...S.av(u?.color||"#888"),width:20,height:20,fontSize:9}}>{u?.ini}</div>{u?.name}</div></td>}<td style={S.td}>{fmt(m.booked)}</td><td style={S.td}><span style={S.bdg(m.status)}>{m.status}</span></td></tr>;})}</tbody>
      </table>
    </div>
  </div>;
}

// ── Master Data ───────────────────────────────────────────────────────────────
function MasterData({data}){
  const[period,setPeriod]=useState("month");
  const active=data.clients.filter(c=>c.status==="active"||c.status==="onboarding");
  const totals=active.reduce((acc,cl)=>{const st=getAggStats(cl.history,period);for(const k of Object.keys(acc))acc[k]=(acc[k]||0)+(st[k]||0);return acc;},{calls:0,connectedCalls:0,noAnswer:0,contactsWorked:0,mb:0,ma:0,newDeals:0,dealsWon:0,pipelineValue:0,linkedinSent:0,emailsSent:0});
  const totalClosed=active.reduce((a,cl)=>a+(cl.closedWonValue||0),0);
  const connRate=totals.calls>0?Math.round(totals.connectedCalls/totals.calls*100):0;
  const bookRate=totals.contactsWorked>0&&totals.mb>0?Math.round(totals.contactsWorked/totals.mb):null;
  const attRate=totals.mb>0?Math.round(totals.ma/totals.mb*100):0;
  const labels={week:"This week",month:"This month",quarter:"This quarter",all:"All time"};
  return <div>
    <div style={{...S.row,justifyContent:"space-between",marginBottom:4}}><div style={S.pt}>Master Data</div><div style={S.row}>{["week","month","quarter","all"].map(p=><button key={p} style={{...S.btn(),fontSize:11,padding:"4px 10px",background:period===p?BRAND:"transparent",color:period===p?"#fff":"var(--color-text-secondary)",border:period===p?"none":"0.5px solid var(--color-border-secondary)"}} onClick={()=>setPeriod(p)}>{labels[p]}</button>)}</div></div>
    <div style={S.ps}>Company-wide rollup · {labels[period]}</div>
    <div style={{background:`linear-gradient(135deg,${BRAND}18,${BRAND}05)`,border:`1px solid ${BRAND}30`,borderRadius:10,padding:"16px 24px",marginBottom:20,display:"flex",gap:28,flexWrap:"wrap",alignItems:"center"}}>
      <div style={{minWidth:180}}><div style={{fontSize:11,fontWeight:600,color:BRAND,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:2}}>Contacts → Meeting Rate</div><div style={{fontSize:28,fontWeight:700}}>{bookRate?`1 : ${bookRate}`:"—"}</div></div>

}

          {canEdit&&<button style={{...S.btn(),fontSize:12}} onClick={()=>{setWeekMode("prior");setWeekForm({weekId:"prior",weekStart:"prior",...blankWeek(),...((cl.history||[]).find(h=>h.weekId==="prior")||{})});setShowUpdate(true);}}>{(cl.history||[]).some(h=>h.weekId==="prior")?"✓ Prior data":"+ Add prior data"}</button>}
          {adm&&<select style={{...S.sel,width:"auto"}} value={cl.status} onChange={e=>upd(cl.id,{status:e.target.value})}>{CLI_ST.map(s=><option key={s}>{s}</option>)}</select>}

            <span style={S.bdg("booked")}>booked</span>

        </div>;
      })()}
      <div style={S.g(2)}>
        <div style={{...S.card,marginBottom:0}}><div style={S.ct}>Next actions</div>
          {adm&&<div style={{...S.row,marginBottom:12,gap:6}}><input style={{...S.inp,flex:1}} placeholder="Add action…" value={nAct} onChange={e=>setNAct(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nAct.trim()){upd(cl.id,{actions:[nAct,...(cl.actions||[])]});setNAct("");}}}/><button style={S.btn("p")} onClick={()=>{if(nAct.trim()){upd(cl.id,{actions:[nAct,...(cl.actions||[])]});setNAct("");}}}>Add</button></div>}

        <div style={{marginBottom:12}}><label style={mlbl()}>Client name</label><input style={minp()} value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Package</label><select style={msel()} value={form.pkg} onChange={e=>setForm({...form,pkg:e.target.value})}>{PKGS.map(p=><option key={p}>{p}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Rep</label><select style={msel()} value={form.gp} onChange={e=>setForm({...form,gp:e.target.value})}>{Object.keys(GP_NAME).map(id=><option key={id} value={id}>{GP_NAME[id]}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Status</label><select style={msel()} value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{CLI_ST.map(s=><option key={s}>{s}</option>)}</select></div>
        <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:20}}><button style={S.btn()} onClick={()=>setShowAdd(false)}>Cancel</button><button style={S.btn("p")} onClick={()=>{if(!form.name)return;onSave({...data,clients:[{...form,id:Date.now(),closedWonValue:0,actions:[],insights:[],stage:getStages(form.pkg)[0],history:[]},...data.clients]});setShowAdd(false);}}>Add client</button></div>
      </div>
    </div>}
  </div>;
}

// ── Meetings ──────────────────────────────────────────────────────────────────
function Meetings({user,data,onSave}){
  const adm=user.role==="admin";
  const[showAdd,setShowAdd]=useState(false);
  const[commPrompt,setCommPrompt]=useState(null);
  const[logTeam,setLogTeam]=useState(true);
  const[logClient,setLogClient]=useState(true);
  const[form,setForm]=useState({clientId:"",client:"",contact:"",sp:"harry",booked:"",attended:"",status:"booked"});
  const mtgs=(adm?data.meetings:data.meetings.filter(m=>m.sp===user.id)).sort((a,b)=>new Date(b.booked)-new Date(a.booked));
  const clientOpts=[{id:"",name:"— Other / not listed —"},...data.clients.map(c=>({id:c.id,name:c.name}))];

  const handleClientSelect=id=>{const cl=data.clients.find(c=>c.id===Number(id));setForm(f=>({...f,clientId:id?Number(id):"",client:cl?cl.name:f.client}));};

  const addMeetingAndCalendar=(newMtg,currentData)=>{
    const calEvt={id:Date.now()+1,title:`${newMtg.contact?newMtg.contact+" — ":""}${newMtg.client} meeting`,date:newMtg.booked,type:"meeting",notes:`Booked by ${getUser(newMtg.sp)?.name||"team"}${newMtg.contact?" with "+newMtg.contact:""}`,createdBy:user.id,meetingId:newMtg.id};
    return{...currentData,meetings:[newMtg,...currentData.meetings],calendarEvents:[calEvt,...(currentData.calendarEvents||[])]};
  };

  const markAttended=m=>{
    const today=todayStr();
    const updMtgs=data.meetings.map(x=>x.id===m.id?{...x,status:"attended",attended:today}:x);
    const monthStr=today.slice(0,7);
    const attendedThisMonth=updMtgs.filter(x=>x.sp===m.sp&&x.status==="attended"&&(x.attended||"").startsWith(monthStr)).length;
    const teamAmt=calcTeamCommission(attendedThisMonth)-calcTeamCommission(attendedThisMonth-1);
    const cfg=getClientCommConfig(m.clientId,m.client);
    const clientAmt=(cfg&&(cfg.type==="perMeeting"||cfg.type==="mixed"))?{amount:cfg.ratePerMeeting||0,label:`£${cfg.ratePerMeeting} per attended meeting (${m.client})`}:null;
    const rep=getUser(m.sp);
    onSave({...data,meetings:updMtgs});
    setLogTeam(teamAmt>0);
    setLogClient(!!clientAmt);
    setCommPrompt({rep,teamAmt,clientAmt,meeting:m,attendedThisMonth,totalTeam:calcTeamCommission(attendedThisMonth)});
  };

  const logComm=(prompt,logTeam,logClient)=>{
    const today=todayStr();const newComms=[...data.commissions];const newInvoices=[...(data.clientInvoices||[])];
    if(logTeam&&prompt.teamAmt>0){newComms.unshift({id:Date.now(),sp:prompt.rep.id,client:prompt.meeting.client,contact:prompt.meeting.contact||"",amount:prompt.teamAmt,date:today,status:"pending",note:`Meeting ${prompt.attendedThisMonth} this month — tiered rate`});}
    if(logClient&&prompt.clientAmt){newInvoices.unshift({id:Date.now()+1,clientId:prompt.meeting.clientId||"",clientName:prompt.meeting.client,month:today.slice(0,7),type:"meeting",amount:prompt.clientAmt.amount,note:prompt.clientAmt.label,status:"draft",createdAt:today,invoicedDate:null,paidDate:null});}
    onSave({...data,commissions:newComms,clientInvoices:newInvoices});
    setCommPrompt(null);
  };

  return <div>
    <div style={{...S.row,justifyContent:"space-between",marginBottom:4}}><div style={S.pt}>Meetings</div><button style={S.btn("p")} onClick={()=>setShowAdd(true)}>+ Add meeting</button></div>
    <div style={S.ps}>Book a meeting here — auto-appears on calendar and client page</div>
    <div style={S.g(4)}><Met label="Booked" value={mtgs.filter(m=>m.status==="booked").length}/><Met label="Attended" value={mtgs.filter(m=>m.status==="attended").length}/><Met label="No-show" value={mtgs.filter(m=>m.status==="no-show").length}/><Met label="Show rate" value={(()=>{const c=mtgs.filter(m=>m.status==="attended"||m.status==="no-show");return c.length?Math.round(mtgs.filter(m=>m.status==="attended").length/c.length*100)+"%":"—";})()}/></div>
    <div style={S.card}><table style={S.tbl}>
      <thead><tr><th style={S.th}>Client</th><th style={S.th}>Booked with</th>{adm&&<th style={S.th}>Rep</th>}<th style={S.th}>Booked</th><th style={S.th}>Attended</th><th style={S.th}>Status</th><th style={S.th}>Actions</th></tr></thead>
      <tbody>{mtgs.map(m=>{const u=getUser(m.sp);return <tr key={m.id}>
        <td style={{...S.td,fontWeight:500}}>{m.client}</td>
        <td style={{...S.td,color:"var(--color-text-secondary)"}}>{m.contact||<span style={{color:"var(--color-text-tertiary)"}}>—</span>}</td>
        {adm&&<td style={S.td}><div style={S.row}><div style={{...S.av(u?.color||"#888"),width:20,height:20,fontSize:9}}>{u?.ini}</div>{u?.name}</div></td>}
        <td style={S.td}>{fmt(m.booked)}</td><td style={S.td}>{fmt(m.attended)}</td>
        <td style={S.td}><span style={S.bdg(m.status)}>{m.status}</span></td>
        <td style={S.td}><div style={{...S.row,flexWrap:"wrap",gap:4}}>
          {m.status==="booked"&&<button style={{...S.btn(),fontSize:11,padding:"3px 8px"}} onClick={()=>markAttended(m)}>Attended</button>}
          {m.status==="booked"&&<button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:"#854F0B"}} onClick={()=>onSave({...data,meetings:data.meetings.map(x=>x.id===m.id?{...x,status:"no-show"}:x)})}>No-show</button>}
          {m.status==="booked"&&<button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:"#5F5E5A"}} onClick={()=>onSave({...data,meetings:data.meetings.map(x=>x.id===m.id?{...x,status:"rescheduled"}:x)})}>Rescheduled</button>}
          {m.status==="booked"&&<button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:"#5F5E5A"}} onClick={()=>onSave({...data,meetings:data.meetings.map(x=>x.id===m.id?{...x,status:"cancelled"}:x)})}>Cancel</button>}
          {(m.status==="rescheduled"||m.status==="no-show"||m.status==="cancelled")&&<button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:BD}} onClick={()=>onSave({...data,meetings:data.meetings.map(x=>x.id===m.id?{...x,status:"booked"}:x)})}>Reopen</button>}
          <button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:"#A32D2D"}} onClick={()=>{if(window.confirm("Remove?"))onSave({...data,meetings:data.meetings.filter(x=>x.id!==m.id)})}}>×</button>
        </div></td>
      </tr>;})}</tbody>
    </table></div>

    {/* Commission prompt */}
    {commPrompt&&<div style={S.modal}>
        <div style={S.mbox}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:12,color:"#111"}}>💰 Commission to log</div>
          {commPrompt.teamAmt>0&&<div style={{padding:"10px 14px",background:"#EAF3FB",borderRadius:8,marginBottom:10}}>
            <div style={{...S.row,justifyContent:"space-between"}}>
              <div><div style={{fontSize:12,fontWeight:600,color:"#185FA5",marginBottom:2}}>Team commission — {commPrompt.rep?.name}</div><div style={{fontSize:13,color:"#333"}}>Meeting {commPrompt.attendedThisMonth} this month → <strong>£{commPrompt.teamAmt}</strong></div><div style={{fontSize:11,color:"#555",marginTop:2}}>Month total: £{commPrompt.totalTeam}</div></div>
              <label style={{...S.row,gap:6,cursor:"pointer"}}><input type="checkbox" checked={logTeam} onChange={e=>setLogTeam(e.target.checked)} style={{accentColor:BRAND}}/><span style={{fontSize:12}}>Log</span></label>
            </div>
          </div>}
          {commPrompt.clientAmt&&<div style={{padding:"10px 14px",background:"#E1F5EE",borderRadius:8,marginBottom:10}}>
            <div style={{...S.row,justifyContent:"space-between"}}>
              <div><div style={{fontSize:12,fontWeight:600,color:"#0F6E56",marginBottom:2}}>Client commission owed to Momentum</div><div style={{fontSize:13,color:"#333"}}><strong>£{commPrompt.clientAmt.amount}</strong> — {commPrompt.clientAmt.label}</div><div style={{fontSize:11,color:"#555",marginTop:2}}>Goes to Client Commissions as a draft</div></div>
              <label style={{...S.row,gap:6,cursor:"pointer"}}><input type="checkbox" checked={logClient} onChange={e=>setLogClient(e.target.checked)} style={{accentColor:BRAND}}/><span style={{fontSize:12}}>Log</span></label>
            </div>
          </div>}
          {!commPrompt.teamAmt&&!commPrompt.clientAmt&&<div style={{fontSize:13,color:"#555",marginBottom:12}}>No commission rules configured for this client. Log manually from the commissions tabs.</div>}
          <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:16}}>
            <button style={S.btn()} onClick={()=>setCommPrompt(null)}>Skip</button>
            <button style={S.btn("p")} onClick={()=>logComm(commPrompt,logTeam,logClient)}>Log selected</button>
          </div>
        </div>
      </div>}

    {/* Add meeting modal */}
    {showAdd&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
      <div style={S.mbox}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:4,color:"#111"}}>Add meeting</div>
        <div style={{fontSize:12,color:"#888",marginBottom:16}}>Auto-appears on team calendar and client page.</div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Client</label><select style={msel()} value={form.clientId||""} onChange={e=>handleClientSelect(e.target.value)}>{clientOpts.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
        {!form.clientId&&<div style={{marginBottom:12}}><label style={mlbl()}>Client name (if not listed)</label><input style={minp()} value={form.client} onChange={e=>setForm({...form,client:e.target.value})} placeholder="e.g. Guessworks"/></div>}
        <div style={{marginBottom:12}}><label style={mlbl()}>Booked with (contact name)</label><input style={minp()} value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} placeholder="e.g. Andy Vaughan"/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Rep</label><select style={msel()} value={form.sp} onChange={e=>setForm({...form,sp:e.target.value})}>{USERS.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Booked date</label><input style={minp()} type="date" value={form.booked} onChange={e=>setForm({...form,booked:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Status</label><select style={msel()} value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option value="booked">Booked</option><option value="attended">Attended</option><option value="no-show">No-show</option><option value="rescheduled">Rescheduled</option><option value="cancelled">Cancelled</option></select></div>
        {form.status==="attended"&&<div style={{marginBottom:12}}><label style={mlbl()}>Attended date</label><input style={minp()} type="date" value={form.attended} onChange={e=>setForm({...form,attended:e.target.value})}/></div>}
        <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:20}}>
          <button style={S.btn()} onClick={()=>setShowAdd(false)}>Cancel</button>
          <button style={S.btn("p")} onClick={()=>{
            if((!form.clientId&&!form.client)||!form.booked)return;
            const newMtg={...form,id:Date.now()};
            const newData=addMeetingAndCalendar(newMtg,data);
            onSave(newData);
            setShowAdd(false);
            setForm({clientId:"",client:"",contact:"",sp:"harry",booked:"",attended:"",status:"booked"});
            if(form.status==="attended"){
              const monthStr=(form.attended||form.booked||todayStr()).slice(0,7);
              const attendedThisMonth=[...newData.meetings].filter(x=>x.sp===form.sp&&x.status==="attended"&&(x.attended||x.booked||"").startsWith(monthStr)).length;
              const teamAmt=calcTeamCommission(attendedThisMonth)-calcTeamCommission(attendedThisMonth-1);
              const cfg=getClientCommConfig(form.clientId,form.client);
              const clientAmt=(cfg&&(cfg.type==="perMeeting"||cfg.type==="mixed"))?{amount:cfg.ratePerMeeting||0,label:`£${cfg.ratePerMeeting} per attended meeting (${form.client})`}:null;
              const rep=getUser(form.sp);
              if(teamAmt>0||clientAmt)setCommPrompt({rep,teamAmt,clientAmt,meeting:newMtg,attendedThisMonth,totalTeam:calcTeamCommission(attendedThisMonth)});
            }
          }}>Add meeting</button>
        </div>
      </div>
    </div>}
  </div>;
}

// ── Team Commissions ──────────────────────────────────────────────────────────
function Commissions({user,data,onSave}){
  const adm=user.role==="admin";
  const now=new Date();
  const currentMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const[selectedMonth,setSelectedMonth]=useState(currentMonth);
  const[showAdd,setShowAdd]=useState(false);
  const[editComm,setEditComm]=useState(null);
  const[form,setForm]=useState({sp:"harry",client:"",contact:"",amount:"",date:"",status:"pending",note:""});

  const months=Array.from({length:12},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-i,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;});
  const allCms=adm?data.commissions:data.commissions.filter(x=>x.sp===user.id);
  const monthCms=allCms.filter(x=>x.date&&x.date.startsWith(selectedMonth)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalAll=allCms.reduce((a,b)=>a+b.amount,0);
  const paidAll=allCms.filter(x=>x.status==="paid").reduce((a,b)=>a+b.amount,0);
  const pendAll=allCms.filter(x=>x.status==="pending").reduce((a,b)=>a+b.amount,0);

  const suggestions=(()=>{
    if(selectedMonth!==currentMonth||!adm)return[];
    const attended=data.meetings.filter(m=>m.status==="attended"&&m.attended&&m.attended.startsWith(currentMonth));
    const byRep={};
    for(const m of attended){if(!byRep[m.sp])byRep[m.sp]={sp:m.sp,meetings:[],count:0};byRep[m.sp].meetings.push(m);byRep[m.sp].count++;}
    return Object.values(byRep).map(g=>{
      const expected=calcTeamCommission(g.count);
      const logged=allCms.filter(c=>c.sp===g.sp&&c.date&&c.date.startsWith(currentMonth)).reduce((a,b)=>a+b.amount,0);
      const diff=Math.round(expected-logged);
      return diff>0.5?{sp:g.sp,rep:getUser(g.sp),count:g.count,expected,logged,diff,meetings:g.meetings}:null;
    }).filter(Boolean);
  })();

  return <div>
    <div style={{...S.row,justifyContent:"space-between",marginBottom:4}}>
      <div style={S.pt}>Team Commissions</div>
      {adm&&<button style={S.btn("p")} onClick={()=>setShowAdd(true)}>+ Add commission</button>}
    </div>
    <div style={S.ps}>{adm?"Monthly view — tiered by meetings attended this month":"Your commission earnings by month"}</div>
    <div style={S.g(3)}><Met label="All time total" value={`£${totalAll.toLocaleString()}`}/><Met label="All time paid" value={`£${paidAll.toLocaleString()}`} color="#0F6E56"/><Met label="All time pending" value={`£${pendAll.toLocaleString()}`} color="#854F0B"/></div>

    <div style={S.card}>
      <div style={{...S.row,justifyContent:"space-between",marginBottom:16}}>
        <div style={S.ct}>Monthly view</div>
        <select style={{...S.sel,width:"auto"}} value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>{months.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}</select>
      </div>

      {suggestions.length>0&&<div style={{padding:"12px 14px",background:BL,border:`1px solid ${BRAND}30`,borderRadius:8,marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:600,color:BRAND,marginBottom:8}}>Suggested for {fmtMonth(currentMonth)}</div>
        {suggestions.map((s,i)=><div key={i} style={{...S.row,justifyContent:"space-between",marginBottom:6}}>
          <div>
            <div style={{fontSize:13,fontWeight:500}}>{s.rep?.name} — {s.count} meetings attended</div>
            <div style={{fontSize:12,color:"var(--color-text-secondary)"}}>{s.meetings.map(m=>m.contact||m.client).join(" · ")} · Expected £{s.expected} · Logged £{s.logged} · Gap £{s.diff}</div>
          </div>
          <button style={{...S.btn("p"),fontSize:11,padding:"4px 12px"}} onClick={()=>{const meetingList=s.meetings.map(m=>m.contact||m.client).join(", ");onSave({...data,commissions:[{id:Date.now(),sp:s.sp,client:"Multiple clients",contact:meetingList,amount:s.diff,date:`${currentMonth}-01`,status:"pending",note:`${s.count} meetings in ${fmtMonth(currentMonth)}: ${meetingList}`},...data.commissions]});}}>Log £{s.diff}</button>
        </div>)}
      </div>}

      {monthCms.length===0&&<div style={{fontSize:12,color:"var(--color-text-tertiary)",padding:"8px 0"}}>No entries for {fmtMonth(selectedMonth)}.</div>}
      {monthCms.length>0&&<table style={S.tbl}>
        <thead><tr>{adm&&<th style={S.th}>Rep</th>}<th style={S.th}>Client</th><th style={S.th}>Booked with</th><th style={S.th}>Amount</th><th style={S.th}>Status</th><th style={S.th}>Note</th>{adm&&<th style={S.th}>Actions</th>}</tr></thead>
        <tbody>{monthCms.map(x=>{const u=getUser(x.sp);return <tr key={x.id}>
          {adm&&<td style={S.td}><div style={S.row}><div style={{...S.av(u?.color||"#888"),width:20,height:20,fontSize:9}}>{u?.ini}</div>{u?.name}</div></td>}
          <td style={{...S.td,fontWeight:500}}>{x.client}</td>
          <td style={{...S.td,color:"var(--color-text-secondary)",fontSize:12}}>{x.contact||"—"}</td>
          <td style={{...S.td,fontWeight:600,color:BRAND}}>£{x.amount.toLocaleString()}</td>
          <td style={S.td}><span style={S.bdg(x.status)}>{x.status}</span></td>
          <td style={{...S.td,fontSize:11,color:"var(--color-text-tertiary)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.note||"—"}</td>
          {adm&&<td style={S.td}><div style={S.row}>
            {x.status==="pending"&&<button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:"#0F6E56"}} onClick={()=>onSave({...data,commissions:data.commissions.map(c=>c.id===x.id?{...c,status:"paid"}:c)})}>Mark paid</button>}
            <button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:BRAND}} onClick={()=>setEditComm({...x})}>Edit</button>
            <button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:"#A32D2D"}} onClick={()=>{if(window.confirm("Delete?"))onSave({...data,commissions:data.commissions.filter(c=>c.id!==x.id)})}}>×</button>
          </div></td>}
        </tr>;})}
</tbody>
      </table>}
      {monthCms.length>0&&<div style={{...S.row,justifyContent:"flex-end",gap:20,marginTop:12,paddingTop:12,borderTop:"0.5px solid var(--color-border-tertiary)"}}>
        <span style={{fontSize:13}}>Month total: <strong>£{monthCms.reduce((a,b)=>a+b.amount,0).toLocaleString()}</strong></span>
        <span style={{fontSize:13,color:"#854F0B"}}>Pending: <strong>£{monthCms.filter(x=>x.status==="pending").reduce((a,b)=>a+b.amount,0).toLocaleString()}</strong></span>
        <span style={{fontSize:13,color:"#0F6E56"}}>Paid: <strong>£{monthCms.filter(x=>x.status==="paid").reduce((a,b)=>a+b.amount,0).toLocaleString()}</strong></span>
      </div>}
    </div>

    {editComm&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&setEditComm(null)}>
      <div style={S.mbox}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:16,color:"#111"}}>Edit commission</div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Rep</label><select style={msel()} value={editComm.sp} onChange={e=>setEditComm({...editComm,sp:e.target.value})}>{USERS.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Client</label><input style={minp()} value={editComm.client} onChange={e=>setEditComm({...editComm,client:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Booked with</label><input style={minp()} value={editComm.contact||""} onChange={e=>setEditComm({...editComm,contact:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Amount (£)</label><input style={minp()} type="number" value={editComm.amount} onChange={e=>setEditComm({...editComm,amount:Number(e.target.value)})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Date</label><input style={minp()} type="date" value={editComm.date} onChange={e=>setEditComm({...editComm,date:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Status</label><select style={msel()} value={editComm.status} onChange={e=>setEditComm({...editComm,status:e.target.value})}><option value="pending">Pending</option><option value="paid">Paid</option></select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Note</label><input style={minp()} value={editComm.note||""} onChange={e=>setEditComm({...editComm,note:e.target.value})}/></div>
        <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:20}}><button style={S.btn()} onClick={()=>setEditComm(null)}>Cancel</button><button style={S.btn("p")} onClick={()=>{onSave({...data,commissions:data.commissions.map(c=>c.id===editComm.id?editComm:c)});setEditComm(null);}}>Save</button></div>
      </div>
    </div>}

    {showAdd&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
      <div style={S.mbox}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:16,color:"#111"}}>Add commission</div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Rep</label><select style={msel()} value={form.sp} onChange={e=>setForm({...form,sp:e.target.value})}>{USERS.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Client</label><input style={minp()} value={form.client} onChange={e=>setForm({...form,client:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Booked with</label><input style={minp()} value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} placeholder="e.g. Andy Vaughan"/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Amount (£)</label><input style={minp()} type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Date</label><input style={minp()} type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Note</label><input style={minp()} value={form.note} onChange={e=>setForm({...form,note:e.target.value})}/></div>
        <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:20}}><button style={S.btn()} onClick={()=>setShowAdd(false)}>Cancel</button><button style={S.btn("p")} onClick={()=>{if(!form.client||!form.amount)return;onSave({...data,commissions:[{...form,id:Date.now(),amount:Number(form.amount)},...data.commissions]});setShowAdd(false);setForm({sp:"harry",client:"",contact:"",amount:"",date:"",status:"pending",note:""});}}>Add</button></div>
      </div>
    </div>}
  </div>;
}

// ── Client Commissions ────────────────────────────────────────────────────────
function ClientCommissions({user,data,onSave}){
  const now=new Date();
  const currentMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const[selectedMonth,setSelectedMonth]=useState(currentMonth);
  const[showAdd,setShowAdd]=useState(false);
  const[showDeal,setShowDeal]=useState(false);
  const[showMargin,setShowMargin]=useState(false);
  const[invoiceForm,setInvoiceForm]=useState({clientId:"",month:currentMonth,type:"meeting",amount:"",note:""});
  const[dealForm,setDealForm]=useState({clientId:"",amount:"",date:"",note:""});
  const[marginForm,setMarginForm]=useState({margin:"",date:currentMonth+"-01",note:""});
  const months=Array.from({length:12},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-i,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;});
  const invoices=data.clientInvoices||[];
  const closedWon=data.closedWonDeals||[];
  const monthInvoices=invoices.filter(i=>i.month===selectedMonth);
  const statusStyle=s=>{const m={draft:["#F1EFE8","#5F5E5A"],invoiced:[BL,BD],paid:["#EAF3DE","#3B6D11"]};const[bg,co]=m[s]||m.draft;return{fontSize:11,fontWeight:600,padding:"2px 10px",borderRadius:20,background:bg,color:co,display:"inline-block"};};
  const updateStatus=(id,status)=>onSave({...data,clientInvoices:invoices.map(i=>i.id===id?{...i,status,invoicedDate:status==="invoiced"&&!i.invoicedDate?todayStr():i.invoicedDate,paidDate:status==="paid"?todayStr():i.paidDate}:i)});
  const totalInvoiced=invoices.reduce((a,b)=>a+b.amount,0);
  const totalPaid=invoices.filter(i=>i.status==="paid").reduce((a,b)=>a+b.amount,0);
  const totalOutstanding=invoices.filter(i=>i.status==="invoiced").reduce((a,b)=>a+b.amount,0);
  const totalDraft=invoices.filter(i=>i.status==="draft").reduce((a,b)=>a+b.amount,0);

  // Auto-suggest meeting commissions for current month
  const suggestions=selectedMonth===currentMonth?data.clients.filter(cl=>{
    const cfg=getClientCommConfig(cl.id,cl.name);
    if(!cfg||(cfg.type!=="perMeeting"&&cfg.type!=="mixed"))return false;
    const attended=data.meetings.filter(m=>(m.clientId===cl.id||m.client===cl.name)&&m.status==="attended"&&(m.attended||"").startsWith(currentMonth)).length;
    const logged=invoices.filter(i=>i.clientId===cl.id&&i.month===currentMonth&&i.type==="meeting").reduce((a,b)=>a+b.amount,0);
    return attended>0&&(attended*(cfg.ratePerMeeting||0))>logged;
  }).map(cl=>{
    const cfg=getClientCommConfig(cl.id,cl.name);
    const attended=data.meetings.filter(m=>(m.clientId===cl.id||m.client===cl.name)&&m.status==="attended"&&(m.attended||"").startsWith(currentMonth)).length;
    const owed=attended*(cfg.ratePerMeeting||0);
    const logged=invoices.filter(i=>i.clientId===cl.id&&i.month===currentMonth&&i.type==="meeting").reduce((a,b)=>a+b.amount,0);
    return{cl,cfg,attended,owed,gap:owed-logged};
  }):[];

  const addDraft=cl=>{const g=suggestions.find(s=>s.cl.id===cl.id);if(!g)return;const entry={id:Date.now(),clientId:cl.id,clientName:cl.name,month:currentMonth,type:"meeting",amount:g.gap,note:`${g.cfg.label} · ${g.attended} meetings in ${fmtMonth(currentMonth)}`,status:"draft",createdAt:todayStr(),invoicedDate:null,paidDate:null};onSave({...data,clientInvoices:[entry,...invoices]});};
  const saveDeal=()=>{
    if(!dealForm.clientId||!dealForm.amount)return;
    const cl=data.clients.find(c=>c.id===Number(dealForm.clientId));
    const cfg=getClientCommConfig(Number(dealForm.clientId),cl?.name||"");
    let commAmt=0;
    if(cfg?.type==="dealPercent")commAmt=Number(dealForm.amount)*cfg.rate;
    else if(cfg?.type==="mixed")commAmt=Math.min(Number(dealForm.amount)*(cfg.dealRate||0),cfg.dealCap||Infinity);
    else if(Number(dealForm.clientId)===3){const r=calcGRIDRate(cl?.startDate,Number(dealForm.amount));commAmt=Number(dealForm.amount)*r.rate;}
    else if(cfg?.dealFixed)commAmt=cfg.dealFixed;
    const month=dealForm.date?.slice(0,7)||currentMonth;
    const entry={id:Date.now(),clientId:Number(dealForm.clientId),clientName:cl?.name||"",month,type:"deal",amount:Math.round(commAmt),note:`Closed won: £${Number(dealForm.amount).toLocaleString()} deal. ${dealForm.note||""}`.trim(),status:"draft",createdAt:todayStr(),invoicedDate:null,paidDate:null,dealValue:Number(dealForm.amount)};
    onSave({...data,clientInvoices:[entry,...invoices],closedWonDeals:[{...dealForm,id:Date.now()+1,clientId:Number(dealForm.clientId),amount:Number(dealForm.amount),clientName:cl?.name||""},...closedWon]});
    setShowDeal(false);setDealForm({clientId:"",amount:"",date:"",note:""});
  };
  const saveMargin=()=>{
    if(!marginForm.margin)return;
    const amount=Math.round(Number(marginForm.margin)*0.5);
    const month=marginForm.date?.slice(0,7)||currentMonth;
    const entry={id:Date.now(),clientId:5,clientName:"Phoenix Maxwell",month,type:"margin",amount,note:`50% of £${Number(marginForm.margin).toLocaleString()} margin. ${marginForm.note||""}`.trim(),status:"draft",createdAt:todayStr(),invoicedDate:null,paidDate:null};
    onSave({...data,clientInvoices:[entry,...invoices]});
    setShowMargin(false);setMarginForm({margin:"",date:currentMonth+"-01",note:""});
  };
  const saveInvoice=()=>{
    if(!invoiceForm.clientId||!invoiceForm.amount)return;
    const cl=data.clients.find(c=>c.id===Number(invoiceForm.clientId));
    const entry={id:Date.now(),clientId:Number(invoiceForm.clientId),clientName:cl?.name||"",month:invoiceForm.month,type:invoiceForm.type,amount:Number(invoiceForm.amount),note:invoiceForm.note,status:"draft",createdAt:todayStr(),invoicedDate:null,paidDate:null};
    onSave({...data,clientInvoices:[entry,...invoices]});
    setShowAdd(false);setInvoiceForm({clientId:"",month:currentMonth,type:"meeting",amount:"",note:""});
  };

  return <div>
    <div style={{...S.row,justifyContent:"space-between",marginBottom:4}}>
      <div style={S.pt}>Client Commissions</div>
      <div style={S.row}>
        <button style={{...S.btn(),fontSize:12}} onClick={()=>setShowMargin(true)}>+ Phoenix Maxwell margin</button>
        <button style={{...S.btn(),fontSize:12}} onClick={()=>setShowDeal(true)}>+ Closed-won deal</button>
        <button style={S.btn("p")} onClick={()=>setShowAdd(true)}>+ Add entry</button>
      </div>
    </div>
    <div style={S.ps}>What Momentum is owed by clients · Draft → Raise invoice → Mark paid · Hannah and Gen only</div>
    <div style={S.g(4)}><Met label="Total invoiced" value={`£${totalInvoiced.toLocaleString()}`} color={BRAND}/><Met label="Total paid" value={`£${totalPaid.toLocaleString()}`} color="#0F6E56"/><Met label="Outstanding (invoiced)" value={`£${totalOutstanding.toLocaleString()}`} color="#854F0B"/><Met label="Draft (not yet invoiced)" value={`£${totalDraft.toLocaleString()}`}/></div>

    <div style={S.card}>
      <div style={{...S.row,justifyContent:"space-between",marginBottom:16}}><div style={S.ct}>Monthly view</div><select style={{...S.sel,width:"auto"}} value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>{months.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}</select></div>

      {suggestions.length>0&&<div style={{padding:"12px 14px",background:BL,border:`1px solid ${BRAND}30`,borderRadius:8,marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:600,color:BRAND,marginBottom:8}}>Suggested for {fmtMonth(currentMonth)}</div>
        {suggestions.map(({cl,cfg,gap})=><div key={cl.id} style={{...S.row,justifyContent:"space-between",marginBottom:6}}>
          <div style={{fontSize:13}}>{cl.name} — <span style={{color:"var(--color-text-secondary)"}}>{cfg.label}</span> → <strong>£{gap.toLocaleString()} owed</strong></div>
          <button style={{...S.btn("p"),fontSize:11,padding:"3px 10px"}} onClick={()=>addDraft(cl)}>Add draft</button>
        </div>)}
      </div>}

      {monthInvoices.length===0&&<div style={{fontSize:12,color:"var(--color-text-tertiary)",padding:"12px 0"}}>No entries for {fmtMonth(selectedMonth)}.</div>}
      {monthInvoices.length>0&&<table style={S.tbl}>
        <thead><tr><th style={S.th}>Client</th><th style={S.th}>Type</th><th style={S.th}>Amount</th><th style={S.th}>Note</th><th style={S.th}>Status</th><th style={S.th}>Invoiced</th><th style={S.th}>Paid</th><th style={S.th}>Actions</th></tr></thead>
        <tbody>{monthInvoices.map(inv=><tr key={inv.id}>
          <td style={{...S.td,fontWeight:500}}>{inv.clientName}</td>
          <td style={S.td}><span style={{fontSize:11,background:"#f0f0f0",padding:"2px 8px",borderRadius:10,color:"#555",fontWeight:500}}>{inv.type}</span></td>
          <td style={{...S.td,fontWeight:600,color:BRAND}}>£{inv.amount.toLocaleString()}</td>
          <td style={{...S.td,fontSize:12,color:"var(--color-text-secondary)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inv.note||"—"}</td>
          <td style={S.td}><span style={statusStyle(inv.status)}>{inv.status}</span></td>
          <td style={{...S.td,fontSize:11,color:"var(--color-text-tertiary)"}}>{inv.invoicedDate?fmt(inv.invoicedDate):"—"}</td>
          <td style={{...S.td,fontSize:11,color:"var(--color-text-tertiary)"}}>{inv.paidDate?fmt(inv.paidDate):"—"}</td>
          <td style={S.td}><div style={S.row}>
            {inv.status==="draft"&&<button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:BD}} onClick={()=>updateStatus(inv.id,"invoiced")}>Raise invoice</button>}
            {inv.status==="invoiced"&&<button style={{...S.btn(),fontSize:11,padding:"3px 8px",color:"#0F6E56"}} onClick={()=>updateStatus(inv.id,"paid")}>Mark paid</button>}
            {inv.status==="paid"&&<span style={{fontSize:11,color:"#0F6E56"}}>✓ {fmt(inv.paidDate)}</span>}
            <button style={{background:"none",border:"none",cursor:"pointer",color:"#A32D2D",fontSize:14,padding:"2px 4px"}} onClick={()=>{if(window.confirm("Delete?"))onSave({...data,clientInvoices:invoices.filter(i=>i.id!==inv.id)});}}>×</button>
          </div></td>
        </tr>)}</tbody>
      </table>}
      {monthInvoices.length>0&&<div style={{...S.row,justifyContent:"flex-end",gap:16,marginTop:12,paddingTop:12,borderTop:"0.5px solid var(--color-border-tertiary)"}}>
        <span style={{fontSize:13}}>Month total: <strong>£{monthInvoices.reduce((a,b)=>a+b.amount,0).toLocaleString()}</strong></span>
        <span style={{fontSize:13,color:"#854F0B"}}>Invoiced: <strong>£{monthInvoices.filter(i=>i.status==="invoiced").reduce((a,b)=>a+b.amount,0).toLocaleString()}</strong></span>
        <span style={{fontSize:13,color:"#0F6E56"}}>Paid: <strong>£{monthInvoices.filter(i=>i.status==="paid").reduce((a,b)=>a+b.amount,0).toLocaleString()}</strong></span>
      </div>}
    </div>

    {/* All-time by client */}
    <div style={S.card}>
      <div style={S.ct}>All-time by client</div>
      <table style={S.tbl}>
        <thead><tr><th style={S.th}>Client</th><th style={S.th}>Commission type</th><th style={S.th}>Total invoiced</th><th style={S.th}>Paid</th><th style={S.th}>Outstanding</th></tr></thead>
        <tbody>{data.clients.filter(cl=>getClientCommConfig(cl.id,cl.name)).map(cl=>{const clInvs=invoices.filter(i=>i.clientId===cl.id);const total=clInvs.reduce((a,b)=>a+b.amount,0);if(total===0)return null;const paid=clInvs.filter(i=>i.status==="paid").reduce((a,b)=>a+b.amount,0);const out=clInvs.filter(i=>i.status==="invoiced").reduce((a,b)=>a+b.amount,0);return <tr key={cl.id}><td style={{...S.td,fontWeight:500}}>{cl.name}</td><td style={{...S.td,fontSize:12,color:"var(--color-text-secondary)"}}>{getClientCommConfig(cl.id,cl.name)?.label}</td><td style={{...S.td,fontWeight:500}}>£{total.toLocaleString()}</td><td style={{...S.td,color:"#0F6E56",fontWeight:500}}>£{paid.toLocaleString()}</td><td style={{...S.td,color:out>0?"#854F0B":"var(--color-text-tertiary)",fontWeight:out>0?500:400}}>£{out.toLocaleString()}</td></tr>;})}
        </tbody>
      </table>
    </div>

    {/* Commission rules reference */}
    <div style={{...S.card,background:"var(--color-background-secondary)"}}>
      <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Contract reference</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 24px"}}>
        {[["JGW","£150/attended meeting"],["Laser Red","£150/attended meeting"],["Guessworks","£250/attended + £750/closed won"],["Phoenix Maxwell","50% of monthly profit margin"],["Presented","8% on closed-won"],["GRID","8%/6% tiered months 1-6 · 10%/8% month 7+"],["Projectory","£75/attended meeting"],["Beaumonde","£150/attended + 10% closed-won (capped £2k/deal)"],["Mongoose","£150/attended meeting"]].map(([cl,rule])=>
          <div key={cl} style={{fontSize:12,padding:"3px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}><strong>{cl}:</strong> <span style={{color:"var(--color-text-secondary)"}}>{rule}</span></div>
        )}
      </div>
    </div>

    {showAdd&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
      <div style={S.mbox}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:4,color:"#111"}}>Add commission entry</div>
        <div style={{fontSize:12,color:"#888",marginBottom:16}}>Creates a draft. Raise invoice when ready to bill, mark paid when received.</div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Client</label><select style={msel()} value={invoiceForm.clientId} onChange={e=>setInvoiceForm({...invoiceForm,clientId:e.target.value})}><option value="">Select client…</option>{data.clients.filter(cl=>getClientCommConfig(cl.id,cl.name)).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Month</label><select style={msel()} value={invoiceForm.month} onChange={e=>setInvoiceForm({...invoiceForm,month:e.target.value})}>{months.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Type</label><select style={msel()} value={invoiceForm.type} onChange={e=>setInvoiceForm({...invoiceForm,type:e.target.value})}><option value="meeting">Meeting-based</option><option value="deal">Closed-won deal</option><option value="margin">Monthly margin</option><option value="other">Other</option></select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Amount (£)</label><input style={minp()} type="number" value={invoiceForm.amount} onChange={e=>setInvoiceForm({...invoiceForm,amount:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Note</label><input style={minp()} value={invoiceForm.note} onChange={e=>setInvoiceForm({...invoiceForm,note:e.target.value})}/></div>
        <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:20}}><button style={S.btn()} onClick={()=>setShowAdd(false)}>Cancel</button><button style={S.btn("p")} onClick={saveInvoice}>Add draft</button></div>
      </div>
    </div>}

    {showDeal&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&setShowDeal(false)}>
      <div style={S.mbox}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:4,color:"#111"}}>Log closed-won deal</div>
        <div style={{fontSize:12,color:"#888",marginBottom:16}}>Commission calculated from contract rules. Creates a draft entry.</div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Client</label><select style={msel()} value={dealForm.clientId} onChange={e=>setDealForm({...dealForm,clientId:e.target.value})}><option value="">Select client…</option>{data.clients.filter(cl=>getClientCommConfig(cl.id,cl.name)).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Deal value (£)</label><input style={minp()} type="number" value={dealForm.amount} onChange={e=>setDealForm({...dealForm,amount:e.target.value})} placeholder="e.g. 15000"/></div>
        {dealForm.clientId&&dealForm.amount&&(()=>{
          const cl=data.clients.find(c=>c.id===Number(dealForm.clientId));
          const cfg=getClientCommConfig(Number(dealForm.clientId),cl?.name||"");if(!cfg)return null;
          let preview=0,label="";
          if(cfg.type==="dealPercent"){preview=Number(dealForm.amount)*cfg.rate;label=`${cfg.rate*100}%`;}
          else if(cfg.type==="mixed"&&cfg.dealRate){preview=Math.min(Number(dealForm.amount)*cfg.dealRate,cfg.dealCap||Infinity);label=`${cfg.dealRate*100}% capped £${(cfg.dealCap||0).toLocaleString()}`;}
          else if(cfg.dealFixed){preview=cfg.dealFixed;label=`£${cfg.dealFixed} fixed`;}
          else if(Number(dealForm.clientId)===3){const r=calcGRIDRate(cl?.startDate,Number(dealForm.amount));preview=Number(dealForm.amount)*r.rate;label=r.label;}
          if(!preview)return null;
          return <div style={{padding:"10px 12px",background:"#E1F5EE",borderRadius:8,marginBottom:12,fontSize:13}}><strong>Commission: £{Math.round(preview).toLocaleString()}</strong> ({label})</div>;
        })()}
        <div style={{marginBottom:12}}><label style={mlbl()}>Date closed</label><input style={minp()} type="date" value={dealForm.date} onChange={e=>setDealForm({...dealForm,date:e.target.value})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Note</label><input style={minp()} value={dealForm.note} onChange={e=>setDealForm({...dealForm,note:e.target.value})}/></div>
        <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:20}}><button style={S.btn()} onClick={()=>setShowDeal(false)}>Cancel</button><button style={S.btn("p")} onClick={saveDeal}>Log deal</button></div>
      </div>
    </div>}

    {showMargin&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&setShowMargin(false)}>
      <div style={S.mbox}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:4,color:"#111"}}>Phoenix Maxwell — monthly margin</div>
        <div style={{fontSize:12,color:"#888",marginBottom:16}}>Enter this month's profit margin. We receive 50%.</div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Month</label><input style={minp()} type="month" value={marginForm.date?.slice(0,7)||currentMonth} onChange={e=>setMarginForm({...marginForm,date:e.target.value+"-01"})}/></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Monthly profit margin (£)</label><input style={minp()} type="number" value={marginForm.margin} onChange={e=>setMarginForm({...marginForm,margin:e.target.value})} placeholder="e.g. 1000"/></div>
        {marginForm.margin&&<div style={{padding:"10px 12px",background:"#E1F5EE",borderRadius:8,marginBottom:12,fontSize:13}}><strong>Our commission: £{(Number(marginForm.margin)*0.5).toLocaleString()}</strong></div>}
        <div style={{marginBottom:12}}><label style={mlbl()}>Note</label><input style={minp()} value={marginForm.note} onChange={e=>setMarginForm({...marginForm,note:e.target.value})} placeholder="e.g. Contract £5k/mo, margin £1k"/></div>
        <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:20}}><button style={S.btn()} onClick={()=>setShowMargin(false)}>Cancel</button><button style={S.btn("p")} onClick={saveMargin}>Add draft</button></div>
      </div>
    </div>}
  </div>;
}

// ── Leave ─────────────────────────────────────────────────────────────────────
function Leave({user,data,onSave}){
  const adm=user.role==="admin";
  const[showAdd,setShowAdd]=useState(false);
  const[editLeave,setEditLeave]=useState(null);
  const[form,setForm]=useState({type:"holiday",startDate:"",endDate:"",days:"",reason:""});
  const blank={type:"holiday",startDate:"",endDate:"",days:"",reason:""};
  const respond=(id,st)=>onSave({...data,leaveRequests:data.leaveRequests.map(l=>l.id===id?{...l,status:st}:l)});
  const deleteLeave=id=>{if(window.confirm("Delete this leave request?"))onSave({...data,leaveRequests:data.leaveRequests.filter(l=>l.id!==id)});};
  const saveEdit=()=>{onSave({...data,leaveRequests:data.leaveRequests.map(l=>l.id===editLeave.id?{...editLeave,days:Number(editLeave.days)}:l)});setEditLeave(null);};

        {Array.from({length:cells},(_,i)=>{
          const dn=i-first+1;const valid=dn>=1&&dn<=dim;
          const ds=valid?`${yr}-${String(mo+1).padStart(2,"0")}-${String(dn).padStart(2,"0")}`:"";
          const isToday=valid&&dn===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();

            {valid&&adm&&dayPosts.length===0&&<div style={{fontSize:10,color:"var(--color-border-secondary)",textAlign:"center",marginTop:8}}>+</div>}

      <tbody>{[...postsThisMonth].sort((a,b)=>a.date>b.date?1:-1).map(p=>{const[bg,co]=statusColour[p.status]||statusColour.draft;const wc=p.body?p.body.split(/\s+/).filter(Boolean).length:0;return <tr key={p.id}>
        <td style={S.td}>{fmt(p.date)}</td>

        <td style={S.td}><span style={{...S.bdg(p.status)}}>{p.status}</span></td>

      <div style={S.mbox}>

        <div style={{marginBottom:12}}><label style={mlbl()}>Platform</label><select style={msel()} value={form.platform} onChange={e=>setForm({...form,platform:e.target.value})}><option>LinkedIn (personal)</option><option>LinkedIn (company)</option></select></div>
        <div style={{marginBottom:12}}><label style={mlbl()}>Status</label><select style={msel()} value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option value="draft">Draft</option><option value="scheduled">Scheduled</option><option value="published">Published</option></select></div>
        <div style={{...S.row,justifyContent:"flex-end",gap:8,marginTop:20}}>
          <button style={S.btn()} onClick={()=>setNewPostDate(null)}>Cancel</button>

  </div>;
}

function PostPerformance({user,data,onSave}){
  const adm=user.role==="admin";
  const now=new Date();
  const currentWeek=getISOWeek();
  const allPosts=data.marketing?.posts||[];
  const published=allPosts.filter(p=>p.status==="published").sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalReach=published.reduce((a,p)=>a+p.reach,0);
  const totalEngage=published.reduce((a,p)=>a+p.likes+p.comments+p.shares,0);
  const best=published.length?published.reduce((a,b)=>(b.likes+b.comments+b.shares)>(a.likes+a.comments+a.shares)?b:a,published[0]):null;
  const updPost=(id,ch)=>onSave({...data,marketing:{...data.marketing,posts:allPosts.map(p=>p.id===id?{...p,...ch}:p)}});

  // Weekly LinkedIn stats (followers + leads)
  const weeklyStats=data.marketing?.weeklyStats||{};
  const thisWeek=weeklyStats[currentWeek]||{followers:0,leads:0,notes:""};
  const saveWeek=ch=>{
    const updated={...weeklyStats,[currentWeek]:{...thisWeek,...ch}};
    onSave({...data,marketing:{...data.marketing,weeklyStats:updated}});
  };

  // Sorted weeks for the history table
  const weekHistory=Object.entries(weeklyStats).sort((a,b)=>b[0]>a[0]?1:-1).slice(0,12);

  // Follower growth chart data
  const followerHistory=Object.entries(weeklyStats).filter(([,v])=>v.followers>0).sort((a,b)=>a[0]>b[0]?1:-1).slice(-10);

  const[editPostId,setEditPostId]=useState(null);
  const[editVals,setEditVals]=useState({});

  const openEdit=p=>{setEditPostId(p.id);setEditVals({reach:p.reach||0,impressions:p.impressions||0,likes:p.likes||0,comments:p.comments||0,shares:p.shares||0});};
  const saveEdit=()=>{updPost(editPostId,editVals);setEditPostId(null);};

  return <div>
    <div style={S.pt}>Post Performance</div>
    <div style={S.ps}>Track reach, engagement, followers and LinkedIn leads week by week</div>

    {/* This week panel */}
    <div style={{...S.card,border:`1px solid ${BRAND}30`,background:`linear-gradient(135deg,${BRAND}08,transparent)`,marginBottom:16}}>
      <div style={{...S.row,justifyContent:"space-between",marginBottom:12}}>
        <div style={S.ct}>This week — {currentWeek}</div>
        {adm&&<div style={{fontSize:12,color:"var(--color-text-tertiary)"}}>Auto-saves as you type</div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <div>
          <label style={S.lbl}>LinkedIn followers (current total)</label>
          <input style={S.inp} type="number" value={thisWeek.followers||""} placeholder="e.g. 2840" disabled={!adm} onChange={e=>saveWeek({followers:Number(e.target.value)})}/>
          {(()=>{const prev=weekHistory.find(([wk])=>wk!==currentWeek);const prevF=prev?prev[1].followers:0;const diff=(thisWeek.followers||0)-prevF;return prevF>0&&diff!==0?<div style={{fontSize:11,marginTop:3,color:diff>0?"#0F6E56":"#A32D2D",fontWeight:500}}>{diff>0?"↑":"↓"} {Math.abs(diff)} vs last week</div>:null;})()}
        </div>
        <div>
          <label style={S.lbl}>LinkedIn leads this week</label>
          <input style={S.inp} type="number" value={thisWeek.leads||""} placeholder="e.g. 3" disabled={!adm} onChange={e=>saveWeek({leads:Number(e.target.value)})}/>
          {(()=>{const prev=weekHistory.find(([wk])=>wk!==currentWeek);const prevL=prev?prev[1].leads:0;const diff=(thisWeek.leads||0)-prevL;return prevL>0&&diff!==0?<div style={{fontSize:11,marginTop:3,color:diff>0?"#0F6E56":"#A32D2D",fontWeight:500}}>{diff>0?"↑":"↓"} {Math.abs(diff)} vs last week</div>:null;})()}
        </div>
        <div>
          <label style={S.lbl}>Notes</label>
          <input style={S.inp} value={thisWeek.notes||""} placeholder="Any context this week…" disabled={!adm} onChange={e=>saveWeek({notes:e.target.value})}/>
        </div>
      </div>
    </div>

    {/* KPI summary */}
    <div style={S.g(4)}><Met label="Published posts" value={published.length}/><Met label="Total reach" value={totalReach.toLocaleString()}/><Met label="Total engagement" value={totalEngage.toLocaleString()}/><Met label="Avg engagement rate" value={totalReach>0?((totalEngage/totalReach)*100).toFixed(1)+"%":"—"}/></div>

    {/* Best post */}
    {best&&<div style={{...S.card,background:`linear-gradient(135deg,${BRAND}10,${BRAND}03)`,border:`1px solid ${BRAND}25`,marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:600,color:BRAND,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>🏆 Best performing post</div>

    </div>}

      <div style={{...S.row,justifyContent:"space-between",marginBottom:12}}>

      <tbody>{published.map(p=>{
        const isEditing=editPostId===p.id;
        return <tr key={p.id} style={{background:isEditing?BL:"transparent"}}>
          <td style={S.td}>{fmt(p.date)}</td>

          {isEditing
