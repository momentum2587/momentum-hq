            :["reach","impressions","likes","comments","shares"].map(k=><td key={k} style={{...S.td,color:p[k]>0?"var(--color-text-primary)":"var(--color-text-tertiary)"}}>{p[k]>0?p[k].toLocaleString():"—"}</td>)
          }
          <td style={S.td}>{adm&&(isEditing
            ?<div style={S.row}><button style={{...S.btn("p"),fontSize:11,padding:"3px 8px"}} onClick={saveEdit}>Save</button><button style={{...S.btn(),fontSize:11,padding:"3px 8px"}} onClick={()=>setEditPostId(null)}>×</button></div>
            :<button style={{...S.btn(),fontSize:11,padding:"3px 8px"}} onClick={()=>openEdit(p)}>✎ Edit</button>
          )}</td>
        </tr>;
      })}</tbody>
      </table>
    </div>

    {/* Weekly history */}
    {weekHistory.length>0&&<div style={S.card}>
      <div style={S.ct}>Weekly LinkedIn tracker</div>
      <table style={S.tbl}><thead><tr><th style={S.th}>Week</th><th style={S.th}>Followers</th><th style={S.th}>Follower change</th><th style={S.th}>Leads</th><th style={S.th}>Notes</th></tr></thead>
      <tbody>{weekHistory.map(([wk,v],i)=>{
        const nextWeek=weekHistory[i+1];const prevF=nextWeek?nextWeek[1].followers:0;
        const diff=v.followers&&prevF?(v.followers-prevF):null;
        return <tr key={wk}>
          <td style={{...S.td,fontWeight:500}}>{wk}{wk===currentWeek&&<span style={{...S.bdg("booked"),marginLeft:6,fontSize:9}}>this week</span>}</td>
          <td style={S.td}>{v.followers>0?v.followers.toLocaleString():"—"}</td>
          <td style={S.td}>{diff!==null?<span style={{color:diff>=0?"#0F6E56":"#A32D2D",fontWeight:500}}>{diff>=0?"+":""}{diff}</span>:"—"}</td>
          <td style={S.td}>{v.leads>0?v.leads:"—"}</td>
          <td style={{...S.td,color:"var(--color-text-secondary)",fontSize:12}}>{v.notes||"—"}</td>
        </tr>;
      })}</tbody>
      </table>
    </div>}
  </div>;
}

function AiDraft(){
  const[topic,setTopic]=useState("");const[tone,setTone]=useState("Direct and honest — no fluff");const[loading,setLoading]=useState(false);const[result,setResult]=useState("");const[err,setErr]=useState("");
  const draft=async()=>{
    if(!topic.trim())return;setLoading(true);setResult("");setErr("");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:`You are writing LinkedIn content for Hannah Mitchell, founder of Momentum Sales — a fractional outbound sales agency helping creative/professional service agencies scale past £500k. Hannah's voice: direct, honest, no fluff, conversational, uses real numbers. Tone: ${tone}. Write ONE LinkedIn post. No hashtags unless natural. Don't start with "I". Hook first. Under 250 words.`,messages:[{role:"user",content:`Write a LinkedIn post about: ${topic}`}]})});
      const d=await res.json();if(d.error)throw new Error(d.error.message);
      setResult((d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join(""));
    }catch(e){setErr("Error: "+e.message);}
    setLoading(false);
  };
  return <div>
    <div style={S.pt}>AI Draft</div><div style={S.ps}>Draft LinkedIn posts in Hannah's voice</div>
    <div style={S.g(2)}>
      <div style={S.card}><div style={S.ct}>What do you want to post about?</div>
        <div style={{marginBottom:12}}><label style={S.lbl}>Tone</label><select style={S.sel} value={tone} onChange={e=>setTone(e.target.value)}><option>Direct and honest — no fluff</option><option>Storytelling — lead with a real moment</option><option>Contrarian — challenge a common belief</option><option>Tactical — teach something specific</option><option>Social proof — results-led</option></select></div>
        <div style={{marginBottom:16}}><label style={S.lbl}>Topic / brief</label><textarea style={{...S.inp,height:120,resize:"vertical"}} value={topic} onChange={e=>setTopic(e.target.value)} placeholder="e.g. Why most agency owners never escape delivery mode"/></div>
        <button style={{...S.btn("p"),width:"100%",padding:"10px"}} onClick={draft} disabled={loading||!topic.trim()}>{loading?"Drafting…":"Generate post →"}</button>
        {err&&<div style={{fontSize:12,color:"#A32D2D",marginTop:8}}>{err}</div>}
      </div>
      <div style={S.card}><div style={{...S.row,justifyContent:"space-between",marginBottom:12}}><div style={S.ct}>Draft</div>{result&&<button style={{...S.btn(),fontSize:11}} onClick={()=>navigator.clipboard?.writeText(result)}>Copy</button>}</div>
        {!result&&!loading&&<div style={{fontSize:13,color:"var(--color-text-tertiary)",lineHeight:1.6}}>Your draft will appear here. Requires internet connection.</div>}
        {loading&&<div style={{fontSize:13,color:"var(--color-text-tertiary)"}}>Writing your post…</div>}
        {result&&<textarea style={{...S.inp,height:320,resize:"vertical",fontSize:13,lineHeight:1.7}} value={result} onChange={e=>setResult(e.target.value)}/>}
      </div>
    </div>
  </div>;
}

      {section==="meetings"&&<Meetings user={user} data={data} onSave={onSave}/>}
      {section==="commissions"&&<Commissions user={user} data={data} onSave={onSave}/>}
      {section==="clientcommissions"&&(user.role==="admin"||user.role==="ops")&&<ClientCommissions user={user} data={data} onSave={onSave}/>}
      {section==="masterdata"&&<MasterData data={data}/>}
      {section==="teamcalendar"&&<TeamCalendar user={user} data={data} onSave={onSave}/>}
      {section==="mondaymeeting"&&<MondayMeeting user={user} data={data} onSave={onSave}/>}
      {section==="training"&&<Training user={user} data={data} onSave={onSave}/>}
      {section==="leave"&&<Leave user={user} data={data} onSave={onSave}/>}
      {section==="documents"&&<Documents user={user} data={data} onSave={onSave}/>}
      {section==="calendar"&&<ContentCalendar user={user} data={data} onSave={onSave}/>}
      {section==="performance"&&<PostPerformance user={user} data={data} onSave={onSave}/>}
      {section==="ideas"&&<IdeasBank user={user} data={data} onSave={onSave}/>}
      {section==="aidraft"&&<AiDraft/>}
    </main>
  </div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[section,setSection]=useState("overview");
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[saveStatus,setSaveStatus]=useState("saved"); // "saved"|"saving"|"error"

  useEffect(()=>{
    dbLoad().then(loaded=>{
      let d=loaded||SEED;
      if(!d.closedWonDeals)d.closedWonDeals=[];
      if(!d.clientInvoices)d.clientInvoices=[];
      if(!d.mondayMeetings)d.mondayMeetings={};
      if(d.clients)d.clients=d.clients.map(cl=>({closedWonValue:0,...cl}));
      if(d.commissions)d.commissions=d.commissions.map(c=>({contact:"",...c}));
      setData(d);
      setLoading(false);
    });
  },[]);

  const save=nd=>{
    setData(nd);
    setSaveStatus("saving");
    dbSave(nd).then(()=>setSaveStatus("saved")).catch(()=>setSaveStatus("error"));
  };

  const exportData=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`momentum-hq-backup-${todayStr()}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };

  const importData=async imported=>{
    if(window.confirm("Replace all data with this backup? This will update the shared database for everyone."))await save(imported);
  };

  if(loading)return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--color-background-tertiary)",gap:16}}>
    <div style={{width:36,height:36,borderRadius:"50%",background:BRAND,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16,fontWeight:600}}>m</div>
    <div style={{fontSize:14,color:"var(--color-text-tertiary)"}}>Loading Momentum HQ…</div>
  </div>;

  if(!user)return <Login onLogin={u=>{setUser(u);setSection("overview");}}/>;
  return <>
    <Shell user={user} data={data} onSave={save} section={section} onSection={setSection} onLogout={()=>{setUser(null);setSection("overview");}} onExport={exportData} onImport={importData}/>
    <div style={{position:"fixed",bottom:12,right:16,fontSize:11,color:saveStatus==="error"?"#A32D2D":saveStatus==="saving"?"#854F0B":"#0F6E56",background:"#fff",padding:"3px 10px",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.1)",border:"0.5px solid var(--color-border-tertiary)",transition:"color 0.3s"}}>
      {saveStatus==="saving"?"● Saving…":saveStatus==="error"?"⚠ Save failed — check connection":"● Saved"}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
